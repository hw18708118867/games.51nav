    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="22" fill="#0a0a0f"/>
  <!-- Brain vector paths -->
  <g fill="none" stroke="url(#g)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 50 18 C 35 18, 22 28, 22 42 C 22 50, 26 54, 26 56 C 25 58, 24 62, 24 64 C 24 70, 28 76, 34 76 C 36 76, 38 75, 40 74 C 42 78, 46 80, 50 80"/>
