    <path d="M 26 42 C 30 40, 32 44, 30 46" stroke-width="1.5" opacity="0.7"/>
    <path d="M 74 42 C 70 40, 68 44, 70 46" stroke-width="1.5" opacity="0.7"/>
  </g>
  <!-- Synapse dots -->
  <circle cx="30" cy="36" r="2" fill="#00E5FF">
